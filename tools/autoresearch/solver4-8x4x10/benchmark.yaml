schema_version: 1
suite_id: solver4-p4-stretch-autoresearch
benchmark_mode: full_solve
comparison_category: score_quality
class: stretch
title: Solver4 p=4 Social Golfer autoresearch lane
description: >-
  Fixed autoresearch lane for solver4 across the canonical 32x8x10 pure Social Golfer case plus a
  first wave of larger p=4 stretch cases. Uses gamma=0 with 4 deterministic seeds per case; the
  benchmark runner executes cases with bounded parallelism so the full bundle stays practical.
default_solver_family: solver4
default_solver:
  solver_type: solver4
  stop_conditions:
    max_iterations: 50000000
    time_limit_seconds: 60
    no_improvement_iterations: null
  solver_params:
    solver_type: solver4
    mode: greedy_local_search
    gamma: 0.0
  logging: {}
  telemetry: {}
  seed: 1
  move_policy: null
  allowed_sessions: null
