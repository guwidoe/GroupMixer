<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon declarations -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Random Group Generator - Split Names into Balanced Teams</title>
    <meta name="title" content="Random Group Generator - Split Names into Balanced Teams" />
    <meta name="description" content="Keep certain people together or apart. Balance people by gender or other attributes. Generate multiple rounds with minimal repeats." />
    <meta name="author" content="GroupMixer" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://www.groupmixer.app/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.groupmixer.app/" />
    <meta property="og:title" content="Random Group Generator - Split Names into Balanced Teams" />
    <meta property="og:description" content="Keep certain people together or apart. Balance people by gender or other attributes. Generate multiple rounds with minimal repeats." />
    <meta property="og:image" content="https://www.groupmixer.app/og-image.png" />
    <meta property="og:site_name" content="GroupMixer" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.groupmixer.app/" />
    <meta name="twitter:title" content="Random Group Generator - Split Names into Balanced Teams" />
    <meta name="twitter:description" content="Keep certain people together or apart. Balance people by gender or other attributes. Generate multiple rounds with minimal repeats." />
    <meta name="twitter:image" content="https://www.groupmixer.app/og-image.png" />
    
    <!-- Structured Data -->
    <script id="groupmixer-route-schema" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "GroupMixer",
      "url": "https://www.groupmixer.app/",
      "description": "Keep certain people together or apart. Balance people by gender or other attributes. Generate multiple rounds with minimal repeats.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "Group Mixer"
      }
    }
    </script>
    <script id="groupmixer-agent-bootstrap" type="application/json">
    {
      "version": "1",
      "kind": "browser-agent-api",
      "global": "GroupMixerAgent",
      "readyEvent": "groupmixer:agent-ready",
      "preferredTransport": "worker",
      "transports": ["worker", "wasm"],
      "bootstrapMethod": "capabilities"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
