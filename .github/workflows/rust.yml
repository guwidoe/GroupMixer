name: Rust CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  rust-tests:
    name: Rust tests (nextest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - name: Run fast Rust suite
        run: bash ./scripts/test-rust-fast.sh

  rust-coverage:
    name: Rust coverage (llvm-cov)
    runs-on: ubuntu-latest
    env:
      RUST_COVERAGE_FAIL_UNDER_LINES: '78'
      RUST_COVERAGE_FAIL_UNDER_FUNCTIONS: '87'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate gated Rust coverage artifacts
        run: bash ./scripts/coverage-rust.sh
      - name: Publish Rust coverage summary
        run: |
          echo '## Rust coverage gate' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          cat target/coverage/rust-summary.txt >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: rust-coverage-artifacts
          path: |
            target/coverage/rust.lcov
            target/coverage/rust-summary.txt
            target/coverage/rust-html/
          retention-days: 7
