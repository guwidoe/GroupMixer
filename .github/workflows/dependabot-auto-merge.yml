name: Dependabot Auto Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled]
  deployment_status:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    if: >-
      (github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]') ||
      github.event_name == 'deployment_status'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Dependabot PR
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_URL_FROM_EVENT: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR_FROM_EVENT: ${{ github.event.pull_request.user.login }}
          DEPLOYMENT_SHA: ${{ github.event.deployment.sha }}
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment.environment }}
          DEPLOYMENT_STATUS_ENVIRONMENT: ${{ github.event.deployment_status.environment }}
          DEPLOYMENT_STATE: ${{ github.event.deployment_status.state }}
        run: |
          set -euo pipefail

          echo "url=" >> "$GITHUB_OUTPUT"

          if [[ "$EVENT_NAME" == "pull_request_target" ]]; then
            if [[ "$PR_AUTHOR_FROM_EVENT" != "dependabot[bot]" ]]; then
              echo "Not a Dependabot PR; skipping."
              exit 0
            fi

            echo "url=$PR_URL_FROM_EVENT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$DEPLOYMENT_STATE" != "success" ]]; then
            echo "Deployment status is '$DEPLOYMENT_STATE'; skipping."
            exit 0
          fi

          environment="$DEPLOYMENT_ENVIRONMENT"
          if [[ -z "$environment" ]]; then
            environment="$DEPLOYMENT_STATUS_ENVIRONMENT"
          fi

          if [[ "$environment" != "Preview" ]]; then
            echo "Deployment environment is '$environment'; skipping."
            exit 0
          fi

          pr_url="$({
            gh api "repos/$REPO/commits/$DEPLOYMENT_SHA/pulls" \
              -H "Accept: application/vnd.github+json" \
              --jq '.[] | select(.state == "open" and .user.login == "dependabot[bot]") | .html_url'
          } | head -n1)"

          if [[ -z "$pr_url" ]]; then
            echo "No open Dependabot PR found for deployment sha $DEPLOYMENT_SHA; skipping."
            exit 0
          fi

          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.pr.outputs.url != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: gh pr merge --auto --merge "$PR_URL"
