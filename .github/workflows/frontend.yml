name: Frontend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        run: cd webapp && npm ci
      - name: Run ESLint
        run: cd webapp && npm run lint

  unit-coverage:
    name: Unit tests + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        run: cd webapp && npm ci
      - name: Run unit/component coverage gate
        run: cd webapp && npm run test:coverage:ci
      - name: Publish frontend coverage summary
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('node:fs');
          const summary = JSON.parse(fs.readFileSync('webapp/coverage/unit/coverage-summary.json', 'utf8'));
          const total = summary.total;
          console.log('## Frontend coverage gate');
          console.log('');
          console.log('| Metric | Coverage |');
          console.log('| --- | ---: |');
          console.log(`| Lines | ${total.lines.pct}% |`);
          console.log(`| Statements | ${total.statements.pct}% |`);
          console.log(`| Functions | ${total.functions.pct}% |`);
          console.log(`| Branches | ${total.branches.pct}% |`);
          NODE
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: webapp/coverage/unit/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: cd backend/wasm && wasm-pack build --target web --out-dir ../../webapp/public/pkg
      - name: Install dependencies
        run: cd webapp && npm ci
      - name: Build webapp
        run: cd webapp && npm run build -- --mode production

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: cd backend/wasm && wasm-pack build --target web --out-dir ../../webapp/public/pkg
      - name: Install dependencies
        run: cd webapp && npm ci
      - name: Install Playwright browsers
        run: cd webapp && npx playwright install chromium --with-deps
      - name: Run E2E tests (excluding visual regression)
        run: cd webapp && npm run test:e2e -- --ignore-snapshots --grep-invert "Visual Regression"
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: webapp/playwright-report/
          retention-days: 7
  # NOTE: Visual regression tests are excluded from CI and should be run locally
  # by the agent before creating PRs. Baselines differ between local and CI environments.
