schema_version: 1
suite_id: solver4-larger-p4-stretch
benchmark_mode: full_solve
comparison_category: score_quality
case_selection_policy: allow_non_canonical
class: stretch
title: Solver4 larger p=4 stretch suite
description: >-
  First-wave larger pure Social Golfer p=4 stretch benchmarks after 8x4x10. Runs 4 deterministic
  gamma=0 seeds per case; the benchmark runner executes cases with bounded parallelism so the suite
  remains practical on multi-core benchmark machines.
default_solver_family: solver4
default_solver:
  solver_type: solver4
  stop_conditions:
    max_iterations: 25000000
    time_limit_seconds: 120
    no_improvement_iterations: null
  solver_params:
    solver_type: solver4
    gamma: 0.0
  logging: {}
  telemetry: {}
  seed: 1
  move_policy: null
  allowed_sessions: null
