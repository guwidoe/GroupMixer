case_selection_policy: canonical_only
class: stretch
title: Solver3 SGP tabu tenure sweep (fixed 8..32, multiseed)
description: Multi-seed varied-scenario solver3 suite using the current fixed bounded SGP week-pair tabu tenure reference.
default_solver_family: solver3
default_solver:
  solver_type: solver3
  stop_conditions:
    max_iterations: 1000000
    time_limit_seconds: 60
    no_improvement_iterations: null
