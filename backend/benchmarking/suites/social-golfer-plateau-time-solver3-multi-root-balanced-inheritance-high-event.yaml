schema_version: 1
suite_id: social-golfer-plateau-time-solver3-multi-root-balanced-inheritance-high-event
benchmark_mode: full_solve
comparison_category: score_quality
case_selection_policy: canonical_only
class: stretch
title: Social Golfer high-event multi-root balanced inheritance diagnosis (time-limited, solver3)
description: Dedicated high-event diagnostic suite for the multi-root balanced session inheritance operator on the canonical Social Golfer workload.
default_solver_family: solver3
default_solver:
  solver_type: solver3
  stop_conditions:
    max_iterations: 1000000
    time_limit_seconds: 60
    no_improvement_iterations: null
  solver_params:
    solver_type: solver3
    search_driver:
      mode: multi_root_balanced_session_inheritance
      multi_root_balanced_session_inheritance:
        root_count: 4
        archive_size_per_root: 2
        recombination_no_improvement_window: 1000
        recombination_cooldown_window: 1000
        max_recombination_events_per_run: 8
        max_parent_score_delta_from_best: 250.0
        min_cross_root_session_disagreement: 1
        parent_a_differing_session_share: 0.5
        adaptive_raw_child_retention:
          keep_ratio: 0.5
          warmup_samples: 4
          history_limit: 32
        swap_local_optimum_certification_enabled: false
        child_polish_iterations_per_stagnation_window: 100000
        child_polish_no_improvement_iterations_per_stagnation_window: 100000
        child_polish_max_stagnation_windows: 4
    local_improver:
      mode: sgp_week_pair_tabu
      sgp_week_pair_tabu:
        tenure_mode: fixed_interval
        tenure_min: 8
        tenure_max: 32
        retry_cap: 4
        aspiration_enabled: true
  logging: {}
  telemetry: {}
  seed: 1
  move_policy: null
  allowed_sessions: null
