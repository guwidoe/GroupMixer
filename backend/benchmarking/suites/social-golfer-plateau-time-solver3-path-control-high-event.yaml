schema_version: 1
suite_id: social-golfer-plateau-time-solver3-path-control-high-event
benchmark_mode: full_solve
comparison_category: score_quality
case_selection_policy: canonical_only
class: stretch
title: Social Golfer high-event path-control diagnosis (time-limited, solver3)
description: Dedicated high-event diagnostic suite for comparing aligned session path relinking against matched random-donor and random macro-mutation controls on the canonical Social Golfer workload.
default_solver_family: solver3
default_solver:
  solver_type: solver3
  stop_conditions:
    max_iterations: 1000000
    time_limit_seconds: 60
    no_improvement_iterations: null
  solver_params:
    solver_type: solver3
    search_driver:
      mode: session_aligned_path_relinking
      session_aligned_path_relinking:
        operator_variant: session_aligned_path_relinking
        archive_size: 4
        recombination_no_improvement_window: 1000
        recombination_cooldown_window: 1000
        max_session_imports_per_event: 3
        path_step_no_improvement_limit: 2
        min_aligned_session_distance_for_relinking: 1
        adaptive_raw_child_retention:
          keep_ratio: 0.5
          warmup_samples: 4
          history_limit: 32
        swap_local_optimum_certification_enabled: false
        child_polish_iterations_per_stagnation_window: 100000
        child_polish_no_improvement_iterations_per_stagnation_window: 100000
        child_polish_max_stagnation_windows: 4
    local_improver:
      mode: sgp_week_pair_tabu
      sgp_week_pair_tabu:
        tenure_mode: fixed_interval
        tenure_min: 8
        tenure_max: 32
        retry_cap: 4
        aspiration_enabled: true
  logging: {}
  telemetry: {}
  seed: 1
  move_policy: null
  allowed_sessions: null
cases:
