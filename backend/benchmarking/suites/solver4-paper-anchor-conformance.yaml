schema_version: 1
suite_id: solver4-paper-anchor-conformance
benchmark_mode: full_solve
comparison_category: score_quality
case_selection_policy: allow_non_canonical
class: stretch
title: Solver4 paper-anchor conformance suite
description: >-
  Paper-conformance lane for solver4. Uses the paper's anchor instances via GroupMixer's canonical
  cases: Kirkman 15x5x7 as 5-3-7, social_golfer_32x8x9 as 8-4-9, and social_golfer_32x8x10 as
  8-4-10. Acceptance gate: external validation must pass on every case, and solver4 should solve
  the 5-3-7 and 8-4-9 anchors under their paper-style budgets before we describe the implementation
  as behaviorally faithful. Includes a gamma=0 multiseed sweep plus a small gamma sweep.
default_solver_family: solver4
default_solver:
  solver_type: solver4
  stop_conditions:
    max_iterations: 10000000
    time_limit_seconds: 60
    no_improvement_iterations: null
  solver_params:
    solver_type: solver4
    gamma: 0.0
  logging: {}
  telemetry: {}
  seed: 1
  move_policy: null
  allowed_sessions: null
cases:
  # 5-3-7 anchor (Kirkman)
