schema_version: 1
suite_id: solver3-constructor-broad
benchmark_mode: full_solve
comparison_category: score_quality
case_selection_policy: allow_non_canonical
class: mixed
timeout_policy: complexity_based_wall_time
solver_policy: solver3_construct_then_search
title: Solver3 constructor broad case-selection suite
description: Exhaustive development suite for the new solver3 constructor heuristic. The suite derives total runtime from problem complexity, allocates a construction phase, then runs normal solver3 search from the constructed incumbent.
